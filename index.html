<!DOCTYPE html>

<head>

</head>
<body>

    <!-- Navigation -->

            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" alt="">

            </div>

            <nav>
                <a href="#">STORE</a>
                <a href="#">COMMUNITY</a>
                <a href="#">ABOUT</a>

            <div class="right-nav">
                <button>Install Steam</button>

                <label>Account name:</label>
                <h3>benny202019</h3>
            </div>

            <div class="right">
                <label>What your friends see:</label>

                <div class="friend">

                    <div class="avatar">?</div>

                    <span>alexlenox9</span>

                </div>

            </div>

        </div>

        <form>

            <label>Change my password</label>

            <input type="password">
